# 공지 에디터 이미지 저장소 (AWS S3 + CloudFront).
#
#  - food-biz 프로젝트와 "같은" 버킷(foodbiz-uploads)·CDN 을 공유한다.
#    저장 키는 prefix(saas-admin/) 로 분리해 food-biz 파일과 섞이지 않게 한다.
#
#  ⚠️ AWS access-key / secret-key 는 이 파일(=git 커밋됨)에 두지 않는다.
#     AWS 키는 GitHub push protection 이 자동 차단하고, 노출되면 버킷 전체가 위험하다.
#     실제 키는 git 에 안 올라가는 application-local.yml 에 두고 'local' 프로파일로 로드한다.
#     (run.ps1 이 local 프로파일을 자동 활성화한다 — 그 파일이 없으면 아래 기본값이 쓰인다)
#
#  이 파일의 기본값만으로는 S3 가 꺼져 있어(enabled=false) 이미지는 base64 로 폴백된다.
#  → 그냥 clone 해서 실행해도 앱은 정상 동작한다. S3 를 켜려면 application-local.yml 을 두거나
#     환경변수(S3_ENABLED / S3_ACCESS_KEY / S3_SECRET_KEY)를 준다.
storage:
  s3:
    enabled: ${S3_ENABLED:false}
    bucket: ${S3_BUCKET:foodbiz-uploads}
    region: ${S3_REGION:ap-northeast-2}
    access-key: ${S3_ACCESS_KEY:}
    secret-key: ${S3_SECRET_KEY:}
    # 공개 접근 URL 의 앞부분(CloudFront). 비밀 아님 → 기본값 유지.
    cdn-url: ${S3_CDN_URL:https://d2ziky4ycezd5d.cloudfront.net}
    # 우리 파일이 저장될 키 접두어. food-biz 의 menu/ , notices/ 등과 겹치지 않게 한다.
    key-prefix: ${S3_KEY_PREFIX:saas-admin}

logging:
  level:
    com.saas.admin: DEBUG
