# 한국천문연구원 특일정보 API (공공데이터포털). 공휴일을 가져와 달력에 표시한다.
# service-key 는 "인코딩된(Encoding)" 일반 인증키다 — URL 에 그대로 붙이고 재인코딩하지 않는다.
