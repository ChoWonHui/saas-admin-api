server:
  port: 8089

spring:
  application:
    name: saas-admin-api

  datasource:
    # 접속 정보를 이 파일에 직접 적는다 (사용자 결정 2026-07-14).
    # 어떤 PC / 어떤 경로 / 어떤 IDE 에서 실행하든 별도 설정 없이 그냥 뜨게 하기 위함이다.
    # .env 도, 환경변수도, 작업 디렉터리도 더 이상 신경 쓰지 않는다.
    #
    # ⚠️ 이 파일은 git 에 커밋된다 (origin: github.com/ChoWonHui/saas-admin-api).
    #    아래 비밀번호는 푸시하는 순간 저장소를 볼 수 있는 사람 전원에게 공개된다.
    #    DB 는 공인 IP 에 saas_app@'%' 로 열려 있어 인터넷 어디서든 접속 가능하다.
    #
    # 런타임 계정(saas_app)은 tenant_saas 외 DB 에 접근할 수 없다.
    # → MySQL 5.7 에 RLS 가 없는 상황에서, 최소한 크로스 DB 유출은 DB 권한으로 차단한다.
    #   (ddl-auto: update 를 쓰므로 이 계정에 DDL 권한이 부여돼 있다)
    url: "jdbc:mysql://3.34.129.32:3306/tenant_saas?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8"
    username: saas_app
    password: Ts26_appUser_9QkXv
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 10000

  jpa:
    hibernate:
      # 스키마의 진실 공급원은 JPA 엔티티다. Hibernate 가 테이블을 만들고 컬럼을 추가한다.
      #
      # update 의 한계를 알고 쓴다:
      #  - 컬럼/테이블 "추가" 만 한다. 타입 변경·컬럼 삭제·이름 변경은 조용히 무시한다.
      #  - 엔티티에 없는 제약(FK, 유니크, STORED 생성 컬럼)은 만들지 않는다.
      #    기존 테이블에 이미 걸린 제약은 건드리지 않으므로 그대로 살아 있다.
      #  - 새로 만드는 테이블에 "테넌트당 1건" 같은 제약이 필요하면
      #    DB 가 아니라 애플리케이션 코드에서 막아야 한다.
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc:
          time_zone: Asia/Seoul

# Swagger UI: http://localhost:8089/swagger-ui.html
#
# ⚠️ 운영 배포 시에는 꺼야 한다. API 구조·스키마·검증 규칙이 그대로 노출된다.
#    아래 두 enabled 를 false 로 바꾸면 /swagger-ui, /v3/api-docs 가 모두 404 가 된다.
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    # 태그(@Tag)와 메서드를 선언 순서가 아니라 알파벳순으로 정렬해 화면을 안정시킨다.
    tags-sorter: alpha
    operations-sorter: alpha
    # "Try it out" 후 새로고침해도 입력한 JWT 가 유지된다.
    persist-authorization: true

# ⚠️ JWT 서명키. 이 값이 공개되면 누구나 플랫폼 관리자 토큰을 위조해
#    로그인 없이 전체 API 를 호출할 수 있다. 지금 값은 예시 문자열 그대로다.
jwt:
  secret: change-me-to-a-random-32byte-or-longer-secret-value
  access-token-validity-seconds: 1800      # 30분
  refresh-token-validity-seconds: 1209600  # 14일

# 최초 1회 플랫폼 관리자 계정 부트스트랩. (구 방식 — user_account 기반. 이제 쓰지 않는다)
